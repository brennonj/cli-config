# =====================================================
# TMUX Configuration for Keyboard-Driven Workflow
# Optimized for SSH, Neovim, and Claude Code
# =====================================================

# Change prefix from Ctrl-b to Ctrl-a (easier to reach, better for wrist)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =====================================================
# General Settings
# =====================================================

# Enable mouse support (useful for resizing, but you can disable if you prefer pure keyboard)
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Enable 24-bit color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Faster command sequences (reduces escape time for Neovim)
set -s escape-time 0

# Increase repeat timeout
set -g repeat-time 600

# Focus events for vim/neovim autoread
set -g focus-events on

# =====================================================
# Window & Pane Management (Vim-style)
# =====================================================

# Split panes using | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quickly switch to last window with prefix + q
bind q last-window

# =====================================================
# Copy Mode (Vim-style)
# =====================================================

# Enter copy mode with prefix + [
# Or use prefix + Escape for quick access
bind Escape copy-mode

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Vim-style visual selection and yanking
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Paste with prefix + p
bind p paste-buffer

# =====================================================
# Session Management
# =====================================================

# Quick session switching with prefix + s (opens session list)
# prefix + ( and ) for previous/next session
# prefix + d to detach

# Create new session with prefix + C (capital C)
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# Kill session with confirmation
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# =====================================================
# Useful Shortcuts
# =====================================================

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Clear screen and scrollback with prefix + Ctrl-l
bind C-l send-keys 'C-l' \; clear-history

# Toggle status bar visibility
bind t set -g status

# Synchronize panes (send commands to all panes)
bind S setw synchronize-panes

# =====================================================
# Status Bar Configuration
# =====================================================

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style 'bg=colour234 fg=colour137'
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %m/%d #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# Window status
setw -g window-status-current-style 'fg=colour81 bg=colour238 bold'
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-style 'fg=colour138 bg=colour235'
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# Pane borders
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour81'

# Message style
set -g message-style 'fg=colour232 bg=colour166 bold'

